version: "1.0"
name: "project-bee-ci"
description: "Python testing for Project BEE"
global:
  git_depth: 50

pipeline:
  - name: "Setup Python"
    stage: "build"
    image: "python:3.11"
    steps:
      - step: |
          python --version
          pip --version
          pip install --upgrade pip

  - name: "Install Dependencies"
    stage: "build"
    image: "python:3.11"
    steps:
      - step: |
          pip install -r requirements.txt
          pip install pytest flake8

  - name: "Run Linter"
    stage: "test"
    image: "python:3.11"
    steps:
      - step: |
          flake8 project_bee examples --max-line-length=120 || true

  - name: "Run Tests"
    stage: "test"
    image: "python:3.11"
    steps:
      - step: |
          pytest tests/ -v || true
